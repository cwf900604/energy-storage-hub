<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球储能资讯 | Global Energy Storage News</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="bgCanvas"></canvas>

<header class="header">
  <div class="header-inner">
    <a href="#" class="logo">
      <svg class="logo-svg" viewBox="0 0 32 32" fill="none">
        <rect x="4" y="14" width="24" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <rect x="8" y="6" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <path d="M16 6V2M12 2h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="16" cy="20" r="2" fill="currentColor"/>
      </svg>
      <span class="logo-text">ENERGY<span class="logo-accent">HUB</span></span>
    </a>
    <nav class="nav">
      <a href="#featured" class="nav-link" data-i18n="nav_featured">重磅资讯</a>
      <a href="#news" class="nav-link" data-i18n="nav_all">全部新闻</a>
      <span class="nav-divider"></span>
      <button class="lang-switch" id="langToggle">
        <span class="lang-option" id="langZh">中</span>
        <span class="lang-sep">/</span>
        <span class="lang-option" id="langEn">EN</span>
      </button>
    </nav>
  </div>
</header>

<main class="main">
  <!-- Hero Section -->
  <section class="hero" id="featured">
    <div class="hero-grid" id="heroGrid">
      <div class="hero-placeholder pulse">加载中…</div>
    </div>
    <div class="hero-nav" id="heroNav"></div>
  </section>

  <!-- Stats Bar -->
  <section class="stats-bar">
    <div class="stat">
      <span class="stat-number" id="newsCount">0</span>
      <span class="stat-label" data-i18n="stat_news">articles</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-number" id="sourceCount">0</span>
      <span class="stat-label" data-i18n="stat_sources">sources</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-label">Updated</span>
      <span class="stat-time" id="updateTime">—</span>
    </div>
  </section>

  <!-- All News -->
  <section class="news-section" id="news">
    <div class="section-header">
      <h2 class="section-title" data-i18n="all_news">全部新闻</h2>
      <div class="filter-row">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search..." autocomplete="off">
        </div>
        <select id="sourceFilter" class="filter-select">
          <option value="all" data-i18n="filter_all">全部来源</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>
    <div class="news-grid" id="newsGrid">
      <div class="news-skeleton" style="--delay:0s"></div>
      <div class="news-skeleton" style="--delay:0.1s"></div>
      <div class="news-skeleton" style="--delay:0.2s"></div>
      <div class="news-skeleton" style="--delay:0.3s"></div>
      <div class="news-skeleton" style="--delay:0.4s"></div>
      <div class="news-skeleton" style="--delay:0.5s"></div>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="footer-inner">
    <p class="footer-sources" id="sourcesList"></p>
    <p class="footer-text" data-i18n="footer_text">数据来自公开 RSS 源，每日 UTC 08:03 自动更新</p>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
