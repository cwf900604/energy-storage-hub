<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球储能资讯 | Global Energy Storage News</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="header">
  <div class="header-inner">
    <h1 class="logo">
      <span class="logo-icon">⚡</span>
      <span data-i18n="site_title">全球储能资讯</span>
    </h1>
    <div class="header-right">
      <span class="update-time" id="updateTime">—</span>
      <button class="lang-btn" id="langToggle" aria-label="Switch language">
        <span data-i18n="lang_label">EN</span>
      </button>
    </div>
  </div>
</header>

<main class="main">
  <section class="stats-bar" id="statsBar">
    <span data-i18n="total_news">共 <strong id="newsCount">0</strong> 条新闻</span>
    <span data-i18n="sources_label">来源: <strong id="sourceCount">0</strong> 个</span>
  </section>

  <section class="filter-bar">
    <input type="text" id="searchInput" class="search-input" placeholder="Search / 搜索..." autocomplete="off">
    <select id="sourceFilter" class="filter-select">
      <option value="all" data-i18n="filter_all">全部来源</option>
      <option value="zh" data-i18n="filter_zh">中文</option>
      <option value="en" data-i18n="filter_en">English</option>
    </select>
  </section>

  <div class="news-grid" id="newsGrid">
    <p class="loading" data-i18n="loading">加载中...</p>
  </div>
</main>

<footer class="footer">
  <p data-i18n="footer_text">数据来自公开RSS源，每条新闻均附带原始链接。每日 UTC 08:03 自动更新。</p>
  <p class="sources-list" id="sourcesList"></p>
</footer>

<script src="app.js"></script>
</body>
</html>
